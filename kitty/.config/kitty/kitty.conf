include ./mocha.conf font_family jetbrains mono nerd font
font_size 11
bold_font auto
italic_font auto
bold_italic_font auto
mouse_hide_wait 2.0
cursor_shape block
enabled_layouts splits

# Manage tab settings
tab_title_template "{index}: {title}"
active_tab_title_template "{index}: {title}*"
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# The background color for the entire tab bar strip
tab_bar_background #000000
# Colors for the currently active tab
active_tab_foreground   #000000
active_tab_background   #00a9ee

# Colors for tabs that are not currently active
inactive_tab_foreground #888888
inactive_tab_background #004b71
# Optional: Color for the active tab's separator/border
tab_bar_margin_color #33FF00

# Allow other apps to control kitty: for neovim dynamic padding
allow_remote_control yes
listen_on unix:/tmp/mykitty

#Close the terminal without confirmation
confirm_os_window_close 0

url_color #0087bd
url_style dotted
background_opacity 0.6
foreground #00d9ee
color1 #ff5c57
color3 #f3f99d
color2 #5af78e
color4 #57c7ff

########## KEY BINDINGS ##########
